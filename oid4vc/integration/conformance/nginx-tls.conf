# nginx TLS reverse proxy for OID4VC conformance testing.
#
# The OIDF conformance suite (HAIP profile) requires HTTPS on all issuer and
# verifier endpoints.  This config terminates TLS for two backends:
#
#   Port 8443  →  http://acapy-issuer:8022   (OID4VCI issuer endpoint)
#   Port 8444  →  http://acapy-verifier:8032 (OID4VP verifier endpoint)
#
# The self-signed TLS certificate is generated at container start time by the
# acapy-tls-proxy service entrypoint (see docker-compose.yml).  The OIDF
# conformance suite runs with devmode=true which disables TLS certificate
# validation, so a self-signed cert is sufficient.

events {
    worker_connections 1024;
}

http {
    # ── OID4VCI issuer TLS proxy ──────────────────────────────────────────────
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate      /certs/server.crt;
        ssl_certificate_key  /certs/server.key;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;

        # Increase timeouts for slow credential issuance operations
        proxy_read_timeout    120s;
        proxy_connect_timeout  30s;
        proxy_send_timeout     60s;

        location / {
            proxy_pass         http://acapy-issuer:8022;
            proxy_set_header   Host              acapy-issuer.local;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }
    }

    # ── OID4VP verifier TLS proxy ─────────────────────────────────────────────
    server {
        listen 8444 ssl;
        server_name _;

        ssl_certificate      /certs/server.crt;
        ssl_certificate_key  /certs/server.key;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;

        proxy_read_timeout    120s;
        proxy_connect_timeout  30s;
        proxy_send_timeout     60s;

        location / {
            proxy_pass         http://acapy-verifier:8032;
            proxy_set_header   Host              acapy-verifier.local;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
        }
    }
}
